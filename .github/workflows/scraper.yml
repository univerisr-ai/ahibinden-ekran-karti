name: 🎮 GPU Fırsat Avcısı — Sahibinden AI Scraper

on:
  # ── Zamanlı çalıştırma ────────────────────────────────────
  schedule:
    # Pazartesi ve Perşembe günleri 11:00 TR saati (08:00 UTC)
    - cron: '0 8 * * 1,4'

  # ── Manuel çalıştırma ────────
  workflow_dispatch:
    inputs:
      min_fiyat:
        description: 'Minimum fiyat filtresi (TL, opsiyonel)'
        required: false
        default: ''
      max_fiyat:
        description: 'Maximum fiyat filtresi (TL, opsiyonel)'
        required: false
        default: ''
      bypass_ai:
        description: 'AI analizini atla (sadece scrape)?'
        required: false
        type: boolean
        default: true

jobs:
  scrape:
    name: 🔍 Scrape & Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐍 Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Python Bağımlılıklarını Kur (curl_cffi)
        run: pip install curl_cffi requests

      - name: 🚀 Browser Kurulumu (Playwright için)
        run: npx playwright install chromium --with-deps

      - name: 📦 Bağımlılıkları Yükle
        run: npm install

      - name: 🚀 GPU Fırsat Avcısını Çalıştır
        env:
          # ── Telegram ───────────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TELEGRAM_BOT_TOKEN_1 || secrets.TELEGRAM_BOT_TOKEN_2 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_USER_ID || secrets.TELEGRAM_CHAT_ID }}

          # ── AI (Gemini / OpenRouter) ────────────────────────
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

          # ── Workflow Dispatch parametreleri ──────────────────
          CUSTOM_MIN_PRICE: ${{ github.event.inputs.min_fiyat }}
          CUSTOM_MAX_PRICE: ${{ github.event.inputs.max_fiyat }}
          BYPASS_AI: ${{ github.event.inputs.bypass_ai }}
        run: node src/main.mjs

      - name: 💾 Sonuçları Kaydet (Artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-results-${{ github.run_number }}
          path: output.json
          retention-days: 30
