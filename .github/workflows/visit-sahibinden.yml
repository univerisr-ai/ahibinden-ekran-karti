name: Visit sahibinden ekran karti

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  visit-page:
    runs-on: ubuntu-latest
    steps:
      - name: Request ekran karti page
        shell: bash
        run: |
          set -euo pipefail
          URL="https://www.sahibinden.com/ekran-karti-masaustu"
          PROXY="http://scrapeops:4cd90769-9c97-492d-8d65-56e284c0afaa@proxy.scrapeops.io:8339"
          STATUS="$(curl -x "$PROXY" --silent --show-error --location --output page.html --write-out '%{http_code}' --max-time 60 "$URL")"
          SIZE="$(wc -c < page.html)"
          TITLE="$(grep -oP '(?<=<title>).*?(?=</title>)' page.html | head -n 1 || true)"
          HASH="$(sha256sum page.html | awk '{print $1}')"
          echo "HTTP status: $STATUS"
          echo "Downloaded bytes: $SIZE"
          echo "Page title: ${TITLE:-not found}"
          echo "Page sha256: $HASH"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "Request failed."
            exit 1
          fi

      - name: Upload downloaded page
        uses: actions/upload-artifact@v4
        with:
          name: sahibinden-ekran-karti-page
          path: page.html
